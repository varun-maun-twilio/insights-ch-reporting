apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource # Must match the plugin ID exactly
    uid: PDEE91DDB90597936
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      # The server name matches the docker-compose service name 'clickhouse'
      server: clickhouse
      # The official plugin uses the native TCP port (9000) by default, not HTTP (8123)
      port: 9000
      username: admin
      defaultDatabase: default
      tlsSkipVerify: true # Helpful for local docker setups
    secureJsonData:
      # Put the password here, matching your docker-compose environment variable
      password: admin